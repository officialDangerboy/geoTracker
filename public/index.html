<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GeoTrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--s:#0d1117;--border:#1a2030;--accent:#00ff88;--red:#ff3a5c;--text:#e2e8f0;--muted:#4a5568;--card:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}

/* FIX: allow scrolling, remove overflow:hidden */
body{
  background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem 3rem;
  overflow-y:auto; /* FIXED: was overflow:hidden */
}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(0,255,136,0.05) 0%,transparent 55%),radial-gradient(ellipse at 70% 70%,rgba(0,150,255,0.03) 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

.container{width:100%;max-width:420px;position:relative;z-index:1;animation:up .5s ease both;margin:auto}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo{text-align:center;margin-bottom:1.5rem;padding-top:1rem}
.logo-mark{font-size:clamp(1.6rem,5vw,2rem);font-weight:800;letter-spacing:-0.04em}
.logo-mark span{color:var(--accent)}
.logo-sub{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-top:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}

.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:.9rem;text-align:center;font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent)}

.form{display:none;padding:1.5rem;flex-direction:column;gap:.9rem}
.form.active{display:flex}

.field{display:flex;flex-direction:column;gap:5px}
label{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}

/* password wrapper with eye */
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap input{width:100%;padding-right:2.8rem}
.eye-btn{position:absolute;right:.75rem;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;justify-content:center;transition:color .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.eye-btn:hover{color:var(--accent)}
.eye-btn svg{width:18px;height:18px;pointer-events:none}

input,select{
  background:#060a0f;border:1px solid var(--border);color:var(--text);
  font-family:'Space Mono',monospace;font-size:0.85rem;
  padding:.7rem .9rem;border-radius:5px;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%;
  -webkit-appearance:none; /* mobile fix */
}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,0.08)}
input::placeholder{color:var(--muted)}
input.invalid{border-color:var(--red)!important}
input.valid{border-color:rgba(0,255,136,0.4)!important}
select option{background:#060a0f}

.field-hint{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:2px;min-height:14px}
.field-hint.err{color:#ff6b82}
.field-hint.ok{color:var(--accent)}

/* Auto-generate password button */
.gen-pass-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);
  color:var(--accent);font-family:'Space Mono',monospace;font-size:0.65rem;
  padding:5px 10px;border-radius:4px;cursor:pointer;
  transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;
  margin-top:4px;align-self:flex-start;
}
.gen-pass-btn:hover{background:rgba(0,255,136,0.12)}
.gen-pass-btn svg{width:12px;height:12px;flex-shrink:0}

/* Strength bar */
.strength-bar{height:3px;border-radius:2px;margin-top:4px;background:var(--border);overflow:hidden}
.strength-fill{height:100%;width:0%;transition:width .3s,background .3s;border-radius:2px}

/* Captcha */
.captcha-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:nowrap}
.captcha-img-wrap{position:relative;border:1px solid var(--border);border-radius:5px;overflow:hidden;flex-shrink:0;cursor:pointer;transition:border-color .2s}
.captcha-img-wrap:hover{border-color:var(--accent)}
.captcha-img-wrap img{display:block;width:150px;height:50px;min-width:150px}
.captcha-reload{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.7);border:1px solid rgba(0,255,136,0.2);color:var(--accent);font-size:0.65rem;cursor:pointer;padding:2px 5px;border-radius:3px}
.captcha-input-wrap{flex:1;min-width:0}

.err-box{background:rgba(255,58,92,0.08);border:1px solid rgba(255,58,92,0.25);color:#ff6b82;font-family:'Space Mono',monospace;font-size:0.72rem;padding:.6rem .8rem;border-radius:4px;display:none;line-height:1.5}
.err-box.show{display:block}

.btn-submit{
  background:var(--accent);color:#000;border:none;
  font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;
  padding:.8rem;border-radius:5px;cursor:pointer;
  text-transform:uppercase;letter-spacing:0.06em;
  transition:background .15s,transform .1s;
  margin-top:.25rem;width:100%;
  -webkit-tap-highlight-color:transparent;
}
.btn-submit:hover{background:#00e87a}
.btn-submit:active{transform:scale(0.99)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Mobile responsive */
@media(max-width:480px){
  body{padding:1rem .75rem 2rem}
  .form{padding:1.25rem}
  .captcha-row{flex-direction:column;align-items:stretch}
  .captcha-img-wrap{align-self:flex-start}
  .captcha-img-wrap img{width:160px;height:52px;min-width:unset}
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">Geo<span>Track</span></div>
    <div class="logo-sub">Location Intelligence Platform</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <form class="form active" id="loginForm" onsubmit="doLogin(event)" novalidate autocomplete="on">
      <div class="field">
        <label>Email</label>
        <input type="email" id="lEmail" placeholder="you@example.com" autocomplete="email" inputmode="email">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePw('lPass',this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="err-box" id="lErr"></div>
      <button class="btn-submit" id="lBtn" type="submit">Login →</button>
    </form>

    <!-- SIGNUP -->
    <form class="form" id="signupForm" onsubmit="doSignup(event)" novalidate autocomplete="off">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="sName" placeholder="Your name" autocomplete="name" oninput="validateName()">
        <div class="field-hint" id="sNameHint"></div>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="sEmail" placeholder="you@example.com" autocomplete="off" inputmode="email" oninput="validateEmail()">
        <div class="field-hint" id="sEmailHint"></div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="sPass" placeholder="Min 8 characters" autocomplete="new-password" oninput="validatePass()">
          <button type="button" class="eye-btn" onclick="togglePw('sPass',this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="field-hint" id="sPassHint"></div>
        <button type="button" class="gen-pass-btn" onclick="autoGeneratePassword()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
          Auto-generate strong password
        </button>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="sCPass" placeholder="Repeat password" autocomplete="new-password" oninput="validateCPass()">
          <button type="button" class="eye-btn" onclick="togglePw('sCPass',this)" aria-label="Show confirm password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-hint" id="sCPassHint"></div>
      </div>

      <div class="field">
        <label>Captcha — Solve the Math</label>
        <div class="captcha-row">
          <div class="captcha-img-wrap" onclick="reloadCaptcha()" title="Click to refresh">
            <img id="captchaImg" src="" alt="captcha">
            <button type="button" class="captcha-reload" onclick="reloadCaptcha();event.stopPropagation()">↻</button>
          </div>
          <div class="captcha-input-wrap">
            <div class="field">
              <label>Your Answer</label>
              <input type="number" id="captchaAns" placeholder="= ?" min="0" max="99" inputmode="numeric" style="height:50px">
            </div>
          </div>
        </div>
      </div>

      <div class="err-box" id="sErr"></div>
      <button class="btn-submit" id="sBtn" type="submit">Create Account →</button>
    </form>
  </div>
</div>

<script>
'use strict';
let captchaToken = '';

// ── Tab switch ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('signupForm').classList.toggle('active', tab==='signup');
  document.getElementById('lErr').classList.remove('show');
  document.getElementById('sErr').classList.remove('show');
  if (tab === 'signup' && !captchaToken) loadCaptcha();
}

// ── Eye toggle ────────────────────────────────────────────────────────
const EYE_OPEN = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.querySelector('svg').innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
  inp.focus();
}

// ── Auto-generate password ────────────────────────────────────────────
function autoGeneratePassword() {
  const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const lower = 'abcdefghjkmnpqrstuvwxyz';
  const digits = '23456789';
  const special = '@#$!%*?&';
  const all = upper + lower + digits + special;

  // Guarantee at least one of each type, total 14 chars
  let pwd = [
    upper[Math.floor(Math.random()*upper.length)],
    upper[Math.floor(Math.random()*upper.length)],
    lower[Math.floor(Math.random()*lower.length)],
    lower[Math.floor(Math.random()*lower.length)],
    digits[Math.floor(Math.random()*digits.length)],
    digits[Math.floor(Math.random()*digits.length)],
    special[Math.floor(Math.random()*special.length)],
    special[Math.floor(Math.random()*special.length)],
  ];
  for (let i = 0; i < 6; i++) pwd.push(all[Math.floor(Math.random()*all.length)]);

  // Shuffle
  for (let i = pwd.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pwd[i], pwd[j]] = [pwd[j], pwd[i]];
  }
  const password = pwd.join('');

  // Fill both fields
  const passEl = document.getElementById('sPass');
  const cpassEl = document.getElementById('sCPass');
  passEl.value = password;
  cpassEl.value = password;

  // Show both as text briefly so user can see it
  passEl.type = 'text';
  cpassEl.type = 'text';

  // Update eye icons to "open"
  document.querySelectorAll('#signupForm .eye-btn svg').forEach(svg => svg.innerHTML = EYE_CLOSED);

  // Run validations
  validatePass();
  validateCPass();

  // Copy to clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(password).then(() => {
      const btn = document.querySelector('.gen-pass-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied to clipboard!';
      setTimeout(() => btn.innerHTML = orig, 2500);
    });
  }
}

// ── Validation ────────────────────────────────────────────────────────
function setHint(id, msg, type) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.className = 'field-hint' + (type ? ' '+type : ''); }
}
function setValidity(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('valid', state === true);
  el.classList.toggle('invalid', state === false);
}

function validateName() {
  const v = document.getElementById('sName').value.trim();
  if (!v) { setHint('sNameHint','',null); setValidity('sName',null); return false; }
  if (v.length < 2) { setHint('sNameHint','At least 2 characters','err'); setValidity('sName',false); return false; }
  if (v.length > 60) { setHint('sNameHint','Too long','err'); setValidity('sName',false); return false; }
  setHint('sNameHint','✓ Looks good','ok'); setValidity('sName',true); return true;
}

function validateEmail() {
  const v = document.getElementById('sEmail').value.trim();
  if (!v) { setHint('sEmailHint','',null); setValidity('sEmail',null); return false; }
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  setHint('sEmailHint', ok ? '✓ Valid email' : 'Enter a valid email address', ok?'ok':'err');
  setValidity('sEmail', ok);
  return ok;
}

function validatePass() {
  const v = document.getElementById('sPass').value;
  const fill = document.getElementById('strengthFill');
  if (!v) { setHint('sPassHint','',null); setValidity('sPass',null); fill.style.width='0%'; return false; }

  // Min 8 chars
  if (v.length < 8) {
    setHint('sPassHint',`${v.length}/8 — need ${8-v.length} more character${8-v.length===1?'':'s'}`,'err');
    setValidity('sPass',false);
    fill.style.width = (v.length/8*50)+'%';
    fill.style.background = '#ff3a5c';
    if (document.getElementById('sCPass').value) validateCPass();
    return false;
  }

  let score = 1;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^a-zA-Z0-9]/.test(v)) score++;

  const labels = ['','Weak','Fair','Good','Strong','Very Strong'];
  const colors = ['','#ff3a5c','#f59e0b','#3b82f6','#00ff88','#00ff88'];
  fill.style.width = (score*20)+'%';
  fill.style.background = colors[score];
  setHint('sPassHint', labels[score], score >= 3 ? 'ok' : 'err');
  setValidity('sPass', score >= 2);

  if (document.getElementById('sCPass').value) validateCPass();
  return score >= 2;
}

function validateCPass() {
  const p = document.getElementById('sPass').value;
  const c = document.getElementById('sCPass').value;
  if (!c) { setHint('sCPassHint','',null); setValidity('sCPass',null); return false; }
  const ok = p === c;
  setHint('sCPassHint', ok ? '✓ Passwords match' : '✗ Passwords do not match', ok?'ok':'err');
  setValidity('sCPass', ok);
  return ok;
}

// ── Captcha ───────────────────────────────────────────────────────────
async function loadCaptcha() {
  try {
    const res = await fetch('/api/captcha');
    captchaToken = res.headers.get('X-Captcha-Token') || '';
    const blob = await res.blob();
    const img = document.getElementById('captchaImg');
    if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
    img.src = URL.createObjectURL(blob);
    document.getElementById('captchaAns').value = '';
  } catch(e) { console.error('Captcha load failed'); }
}
function reloadCaptcha() { loadCaptcha(); }

// ── Sanitize input ────────────────────────────────────────────────────
function sanitize(str) {
  return String(str || '').trim().slice(0, 200);
}

// ── Login ─────────────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('lErr');
  errEl.classList.remove('show');

  const email = sanitize(document.getElementById('lEmail').value);
  const password = document.getElementById('lPass').value;

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields';
    errEl.classList.add('show'); return;
  }
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters';
    errEl.classList.add('show'); return;
  }

  const btn = document.getElementById('lBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, password })
    });

    // Anti-spoof: reject non-JSON or unexpected status
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) throw new Error('Unexpected server response');

    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error || 'Login failed'; errEl.classList.add('show'); }
    else window.location.href = '/dashboard';
  } catch(e) {
    errEl.textContent = e.message === 'Unexpected server response' ? 'Server error — try again' : 'Network error';
    errEl.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Login →';
}

// ── Signup ────────────────────────────────────────────────────────────
async function doSignup(e) {
  e.preventDefault();
  const errEl = document.getElementById('sErr');
  errEl.classList.remove('show');

  const nameOk  = validateName();
  const emailOk = validateEmail();
  const passOk  = validatePass();
  const cpassOk = validateCPass();

  if (!nameOk || !emailOk || !passOk || !cpassOk) {
    errEl.textContent = 'Please fix the errors highlighted above';
    errEl.classList.add('show'); return;
  }

  const captchaAns = sanitize(document.getElementById('captchaAns').value);
  if (!captchaAns || isNaN(captchaAns)) {
    errEl.textContent = 'Please solve the captcha';
    errEl.classList.add('show'); return;
  }
  if (!captchaToken) {
    errEl.textContent = 'Captcha not loaded — please refresh';
    errEl.classList.add('show'); return;
  }

  const btn = document.getElementById('sBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        name: sanitize(document.getElementById('sName').value),
        email: sanitize(document.getElementById('sEmail').value),
        password: document.getElementById('sPass').value,
        confirmPassword: document.getElementById('sCPass').value,
        captchaToken,
        captchaAnswer: captchaAns
      })
    });

    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) throw new Error('Unexpected server response');

    const data = await res.json();
    if (!data.ok) {
      errEl.textContent = data.error || 'Signup failed';
      errEl.classList.add('show');
      if ((data.error||'').toLowerCase().includes('captcha') || (data.error||'').includes('expired')) {
        captchaToken = '';
        loadCaptcha();
      }
    } else {
      window.location.href = '/dashboard';
    }
  } catch(e) {
    errEl.textContent = e.message === 'Unexpected server response' ? 'Server error — try again' : 'Network error';
    errEl.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Create Account →';
}

// ── Redirect if already logged in ────────────────────────────────────
(async () => {
  try {
    const res = await fetch('/api/me', { credentials: 'same-origin' });
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) return;
    const d = await res.json();
    if (d.loggedIn) window.location.href = '/dashboard';
  } catch(e) {}
})();
</script>
</body>
</html>
